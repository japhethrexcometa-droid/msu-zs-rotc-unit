name: Process Email Queue

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  process-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Email Processing Endpoint
        run: |
          # Use curl to call the Vercel API endpoint
          # Note: Currently the endpoint uses session-based auth.
          # For a cron job, we might need a bypass secret if it fails due to no Auth header.
          # However, the process-emails.js logic should ideally allow a CRON_SECRET check.
          curl -X POST "${{ secrets.APP_URL }}/api/cron/process-emails" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               -H "Content-Type: application/json"
